<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convite Inacio</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<audio id="musica" loop>
<source src="audio/cancion.mp3" type="audio/mpeg">
</audio>

<main class="convite">

<img src="img/portada.jpg" alt="Convite">

<button id="btnMusica" class="btn-musica">🔊</button>

<nav class="navegacion">

<a class="btn-outline"
href="https://wa.me/34610990777?text=Ol%C3%A1%21%20Confirmo%20minha%20presen%C3%A7a%20como%20padrinho."
target="_blank">
Confirmar asistencia
</a>

<a href="pagina2.html" class="btn-outline-sec">
Ver más →
</a>

</nav>
</main>

<script>
const audio=document.getElementById("musica");
const btn=document.getElementById("btnMusica");
audio.volume=0;

function fadeIn(){
let v=0;
const f=setInterval(()=>{
if(v<1){v+=0.05;audio.volume=v;}
else clearInterval(f);
},200);
}

document.body.addEventListener("click",()=>{
audio.play();
fadeIn();
},{once:true});

btn.onclick=(e)=>{
e.stopPropagation();
if(audio.paused){audio.play();fadeIn();btn.textContent="🔊";}
else{audio.pause();btn.textContent="🔇";}
};
</script>

</body>
</html>
